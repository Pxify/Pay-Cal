};

const WEEKDAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

];

const pad = (n) => String(n).padStart(2, "0");
const keyFor = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
const round2 = (n) => Math.round((n + Number.EPSILON) * 100) / 100;
const gbp = (n) =>
  "£" + Number(n).toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
// Monday-first offset
const leadingBlanks = (y, m) => (new Date(y, m, 1).getDay() + 6) % 7;

/* persistence — browser localStorage (works on any real website) */
const store = {
  async get(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw == null ? null : JSON.parse(raw);
    } catch (e) { return null; }
  },
  async set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  },
};

const persistAvailable = (() => {
  try { const k = '__spc_test__'; localStorage.setItem(k, '1'); localStorage.removeItem(k); return true; }
  catch (e) { return false; }
})();

async function copyText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

/* ---------------------------------------------------------------- component */

function ShiftPayCalendar() {
  const now = new Date();
  const [rates, setRates] = useState(DEFAULT_RATES);
  const [shifts, setShifts] = useState({});
  const [name, setName] = useState("");
  const [defaultHours, setDefaultHours] = useState(DEFAULT_HOURS);
  const [brush, setBrush] = useState("base"); // base | overtime | holiday | erase
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [editing, setEditing] = useState(null); // {key,y,m,d}
  const [confirmClear, setConfirmClear] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [copied, setCopied] = useState("");
  const copyTimer = useRef(null);

  /* load */
  useEffect(() => {
    (async () => {
      const r = await store.get("profile:rates");
      if (r) setRates((p) => ({ ...p, ...r }));
      const s = await store.get("shifts:all");
      if (s) setShifts(s);
      const nm = await store.get("profile:name");
      if (nm) setName(nm);
      const dh = await store.get("profile:defaultHours");
      if (dh) setDefaultHours(dh);
      setLoaded(true);
    })();
  }, []);

  /* save (gated on loaded so we never overwrite before load) */
  useEffect(() => { if (loaded) store.set("profile:rates", rates); }, [rates, loaded]);
  useEffect(() => { if (loaded) store.set("shifts:all", shifts); }, [shifts, loaded]);
  useEffect(() => { if (loaded) store.set("profile:name", name); }, [name, loaded]);
  useEffect(() => { if (loaded) store.set("profile:defaultHours", defaultHours); }, [defaultHours, loaded]);

  const flashCopied = (key) => {
    setCopied(key);
    clearTimeout(copyTimer.current);
    copyTimer.current = setTimeout(() => setCopied(""), 1600);
  };

  /* shift ops */
  const removeShift = (key) =>
    setShifts((p) => { const n = { ...p }; delete n[key]; return n; });

  const onDayClick = (d) => {
    const key = keyFor(year, month, d);
    const exists = !!shifts[key];
    if (brush === "erase") {
      if (exists) removeShift(key);
      return;
    }
    if (!exists) {
      setShifts((p) => ({ ...p, [key]: { rate: brush, hours: defaultHours } }));
    } else {
      setEditing({ key, y: year, m: month, d });
    }
  };

  const patchEditing = (patch) =>
    setShifts((p) => ({ ...p, [editing.key]: { ...p[editing.key], ...patch } }));

  const deleteEditing = () => {
    setShifts((p) => { const n = { ...p }; delete n[editing.key]; return n; });
    setEditing(null);
  };

  const doClearMonth = () => {
    setShifts((p) => {
      const n = { ...p };
      Object.keys(n).forEach((k) => {
        const [yy, mm] = k.split("-").map(Number);
        if (yy === year && mm - 1 === month) delete n[k];
      });
      return n;
    });
    setConfirmClear(false);
  };

  const goMonth = (delta) => {
    let m = month + delta, y = year;
    while (m < 0) { m += 12; y -= 1; }
    while (m > 11) { m -= 12; y += 1; }
    setMonth(m); setYear(y);
  };

  /* month computation — single source of truth for screen + copy */
  const data = useMemo(() => {
    const items = [];
    Object.keys(shifts).forEach((k) => {
      const [yy, mm, dd] = k.split("-").map(Number);
      if (yy === year && mm - 1 === month) {
        const s = shifts[k];
        const rate = rates[s.rate] ?? 0;
        const amount = round2(s.hours * rate);
        const dow = DOW_SHORT[new Date(yy, mm - 1, dd).getDay()];
        items.push({ key: k, day: dd, dow, rateKey: s.rate, hours: s.hours, rate, amount });
      }
    });
    items.sort((a, b) => a.day - b.day);
    const byRate = {};
    RATE_ORDER.forEach((rk) => (byRate[rk] = { hours: 0, amount: 0 }));
    let totalHours = 0, total = 0;
    items.forEach((it) => {
      byRate[it.rateKey].hours += it.hours;
      byRate[it.rateKey].amount = round2(byRate[it.rateKey].amount + it.amount);
      totalHours += it.hours;
      total = round2(total + it.amount);
    });
    return { items, byRate, totalHours, total };
  }, [shifts, rates, year, month]);

  /* plain-text working out (email safe) */
  const breakdownText = useMemo(() => {
    const L = [];
    const gen = new Date();
    const genStr = `${gen.getDate()} ${MONTHS_SHORT[gen.getMonth()]} ${gen.getFullYear()}`;
    L.push("SHIFT PAY BREAKDOWN");
    if (name.trim()) L.push(`Employee: ${name.trim()}`);
    L.push(`Period:   ${MONTHS[month]} ${year}`);
    L.push(`Prepared: ${genStr}`);
    L.push("");
    L.push("HOURLY RATES");
    RATE_ORDER.forEach((rk) =>
      L.push(`  ${RATE_META[rk].label.padEnd(14)}${gbp(rates[rk]).padStart(8)} / hr`)
    );
    L.push("");
    L.push("SHIFTS WORKED");
    if (data.items.length === 0) {
      L.push("  (none logged)");
    } else {
      data.items.forEach((it) => {
        const date = `${it.dow} ${pad(it.day)} ${MONTHS_SHORT[month]}`;
        const line =
          `  ${date.padEnd(12)}${RATE_META[it.rateKey].label.padEnd(14)}` +
          `${it.hours.toFixed(1).padStart(5)} hrs  ×  ${gbp(it.rate).padStart(7)}  =  ${gbp(it.amount).padStart(10)}`;
        L.push(line);
      });
    }
    L.push("");
    L.push("SUMMARY BY RATE");
    RATE_ORDER.forEach((rk) => {
      const b = data.byRate[rk];
      if (b.hours > 0)
        L.push(
          `  ${RATE_META[rk].label.padEnd(14)}${b.hours.toFixed(1).padStart(5)} hrs  ×  ${gbp(rates[rk]).padStart(7)}  =  ${gbp(b.amount).padStart(10)}`
        );
    });
    L.push("");
    L.push(`  ${"TOTAL HOURS".padEnd(14)}${data.totalHours.toFixed(1).padStart(5)} hrs`);
    L.push(`  ${"TOTAL PAY OWED".padEnd(14)}${gbp(data.total).padStart(23)}`);
    return L.join("\n");
  }, [data, rates, name, month, year]);

  const doCopy = async (which, text) => {
    const ok = await copyText(text);
    if (ok) flashCopied(which);
  };

  const resetRates = () => setRates(DEFAULT_RATES);

  /* calendar cells */
  const cells = [];
  const blanks = leadingBlanks(year, month);
  for (let i = 0; i < blanks; i++) cells.push(null);
  const dim = daysInMonth(year, month);
  for (let d = 1; d <= dim; d++) cells.push(d);

  const isToday = (d) =>
    d && year === now.getFullYear() && month === now.getMonth() && d === now.getDate();

  const editShift = editing ? shifts[editing.key] : null;
  const editMeta = editShift ? RATE_META[editShift.rate] : null;
  const editRate = editShift ? rates[editShift.rate] : 0;
  const editPay = editShift ? round2(editShift.hours * editRate) : 0;

  const monthInputValue = `${year}-${pad(month + 1)}`;

  return (
    <div className="spc">
      <style>{CSS}</style>
      <div className="spc-wrap">

        {/* header */}
        <div className="spc-head">
          <div className="spc-title">
            <span className="spc-eyebrow">Shift pay ledger</span>
            <h1 className="spc-h1"><CalendarDays size={22} strokeWidth={2.2} /> Hours &amp; pay tracker</h1>
            <span className="spc-persist">
              {persistAvailable ? "Your rates and shifts save to this device automatically." : "Session only — data resets when you reload."}
            </span>
          </div>
          <div className="spc-name">
            <label htmlFor="spc-nm">Your name (optional — appears on the breakdown)</label>
            <input id="spc-nm" value={name} placeholder="e.g. Jordan Smith"
              onChange={(e) => setName(e.target.value)} />
          </div>
        </div>

        {/* rates */}
        <div className="spc-panel">
          <div className="spc-panel-head">
            <span className="spc-panel-title">Your hourly rates</span>
            <button className="spc-linkbtn" onClick={resetRates}>
              <RotateCcw size={13} /> Reset to defaults
            </button>
          </div>
          <div className="spc-rates">
            {RATE_ORDER.map((rk) => {
              const meta = RATE_META[rk];
              const sel = brush === rk;
              return (
                <button key={rk} className={`spc-rate${sel ? " sel" : ""}`}
                  style={{ "--rc": meta.color }} onClick={() => setBrush(rk)}>
                  <div className="spc-rate-top">
                    <span className="spc-rate-name"><span className="spc-dot" /> {meta.label}</span>
                    {sel && <span className="spc-brushtag">Painting</span>}
                  </div>
                  <div className="spc-rate-val">
                    <span className="spc-rate-unit">£</span>
                    <input className="spc-rate-input mono" type="number" step="0.01" min="0"
                      value={rates[rk]}
                      onClick={(e) => e.stopPropagation()}
                      onChange={(e) => {
                        const v = e.target.value === "" ? 0 : parseFloat(e.target.value);
                        setRates((p) => ({ ...p, [rk]: isNaN(v) ? 0 : v }));
                      }} />
                    <span className="spc-rate-unit">/ hr</span>
                  </div>
                  <input className="spc-slider" type="range" min={meta.min} max={meta.max} step="0.01"
                    value={rates[rk]}
                    onClick={(e) => e.stopPropagation()}
                    onChange={(e) => setRates((p) => ({ ...p, [rk]: parseFloat(e.target.value) }))} />
                </button>
              );
            })}
          </div>
        </div>

        {/* calendar */}
        <div className="spc-panel">
          <div className="spc-tools">
            <div className="spc-nav">
              <button className="spc-nav-btn" onClick={() => goMonth(-1)} aria-label="Previous month"><ChevronLeft size={18} /></button>
              <span className="spc-month">{MONTHS[month]} {year}</span>
              <button className="spc-nav-btn" onClick={() => goMonth(1)} aria-label="Next month"><ChevronRight size={18} /></button>
              <button className="spc-today" onClick={() => { setMonth(now.getMonth()); setYear(now.getFullYear()); }}>Today</button>
              <input className="spc-monthpick" type="month" value={monthInputValue}
                onChange={(e) => {
                  const [y, m] = e.target.value.split("-").map(Number);
                  if (y && m) { setYear(y); setMonth(m - 1); }
                }} aria-label="Jump to month" />
            </div>
            <div className="spc-deflen">
              <span>Default shift</span>
              <input type="number" min="0" max="24" step="0.5" value={defaultHours}
                onChange={(e) => setDefaultHours(e.target.value === "" ? 0 : parseFloat(e.target.value))} />
              <span>hrs</span>
            </div>
          </div>

          <div className="spc-tools" style={{ borderBottom: "1px solid var(--line-soft)" }}>
            <div className="spc-brushrow">
              <span className="spc-brushlabel">Painting with:</span>
              {RATE_ORDER.map((rk) => {
                const meta = RATE_META[rk];
                const on = brush === rk;
                return (
                  <button key={rk} className={`spc-brush${on ? " on" : ""}`}
                    style={on ? { background: meta.color } : {}}
                    onClick={() => setBrush(rk)}>
                    <span className="bd" style={{ background: on ? "#fff" : meta.color }} /> {meta.label}
                  </button>
                );
              })}
              <button className={`spc-brush erase${brush === "erase" ? " on" : ""}`} onClick={() => setBrush("erase")}>
                <Eraser size={13} /> Erase
              </button>
            </div>
            <button className="spc-linkbtn" onClick={() => setConfirmClear(true)}
              disabled={data.items.length === 0}
              style={data.items.length === 0 ? { opacity: 0.4, cursor: "not-allowed" } : {}}>
              <Trash2 size={13} /> Clear month
            </button>
          </div>

          <div className="spc-cal">
            <div className="spc-dow">{WEEKDAYS.map((w) => <span key={w}>{w}</span>)}</div>
            <div className="spc-grid">
              {cells.map((d, i) => {
                if (d === null) return <div key={`b${i}`} className="spc-cell blank" />;
                const key = keyFor(year, month, d);
                const s = shifts[key];
                const meta = s ? RATE_META[s.rate] : null;
                const amt = s ? round2(s.hours * (rates[s.rate] ?? 0)) : 0;
                return (
                  <div key={key} role="button" tabIndex={0}
                    className={`spc-cell${s ? " filled" : ""}${isToday(d) ? " today" : ""}`}
                    style={s ? { background: meta.tint, boxShadow: `inset 0 0 0 1.5px ${meta.color}` } : {}}
                    onClick={() => onDayClick(d)}
                    onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onDayClick(d); } }}
                    title={s ? `${meta.label} · ${s.hours} hrs · ${gbp(amt)}` : "Add a shift"}>
                    <span className="daynum">{d}</span>
                    {s && (
                      <button className="spc-del" aria-label={`Remove shift on ${d} ${MONTHS_SHORT[month]}`}
                        onClick={(e) => { e.stopPropagation(); removeShift(key); }}>
                        <Trash2 size={12} strokeWidth={2.2} />
                      </button>
                    )}
                    {s && (
                      <span className="spc-shift">
                        <span className="h">{s.hours}h</span>
                        <span className="a" style={{ color: meta.color }}>{gbp(amt)}</span>
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="spc-hint">
              Pick a rate above, then click empty days to log a shift ({defaultHours}h by default). Click a logged day to change its hours or rate. Use Erase to remove.
            </div>
          </div>
        </div>

        {/* payslip */}
        <div className="spc-panel">
          <div className="spc-panel-head">
            <span className="spc-panel-title">{MONTHS[month]} {year} — pay owed</span>
          </div>

          {data.items.length === 0 ? (
            <div className="spc-empty">No shifts logged for this month yet. Click days on the calendar to get started.</div>
          ) : (
            <>
              <div className="spc-slip-total">
                <div>
                  <div className="lbl">Total for {MONTHS[month]} {year}</div>
                  <div className="amt">{gbp(data.total)}</div>
                  <div className="hrs">{data.totalHours.toFixed(1)} hrs across {data.items.length} shift{data.items.length === 1 ? "" : "s"}</div>
                </div>
                <div className="spc-copyrow">
                  <button className={`spc-copybtn${copied === "total" ? " done" : ""}`}
                    onClick={() => doCopy("total", gbp(data.total))}>
                    {copied === "total" ? <><Check size={15} /> Copied</> : <><Copy size={15} /> Copy total</>}
                  </button>
                  <button className={`spc-copybtn${copied === "full" ? " done" : ""}`}
                    onClick={() => doCopy("full", breakdownText)}>
                    {copied === "full" ? <><Check size={15} /> Copied</> : <><Copy size={15} /> Copy full breakdown</>}
                  </button>
                </div>
              </div>

              <div className="spc-working">
                <div className="spc-working-head">
                  <span className="spc-panel-title">Working out</span>
                  <span style={{ fontSize: 11, color: "var(--ink-faint)" }}>Copy-ready to send to payroll</span>
                </div>
                <div className="spc-receipt">
                  {RATE_ORDER.map((rk) => (
                    <div key={rk} className="spc-rc-rate">
                      <span>{RATE_META[rk].label} rate</span>
                      <span>{gbp(rates[rk])} / hr</span>
                    </div>
                  ))}
                  <hr className="spc-rc-rule" />
                  {data.items.map((it) => (
                    <div key={it.key} className="spc-rc-line">
                      <span className="left">{it.dow} {pad(it.day)} · {RATE_META[it.rateKey].label} · {it.hours.toFixed(1)}h × {gbp(it.rate)}</span>
                      <span className="right">{gbp(it.amount)}</span>
                    </div>
                  ))}
                  <hr className="spc-rc-rule" />
                  {RATE_ORDER.map((rk) => {
                    const b = data.byRate[rk];
                    if (b.hours <= 0) return null;
                    return (
                      <div key={rk} className="spc-rc-sub">
                        <span>{RATE_META[rk].label}: {b.hours.toFixed(1)}h × {gbp(rates[rk])}</span>
                        <span>{gbp(b.amount)}</span>
                      </div>
                    );
                  })}
                  <hr className="spc-rc-rule" />
                  <div className="spc-rc-sub">
                    <span>Total hours</span><span>{data.totalHours.toFixed(1)} hrs</span>
                  </div>
                  <div className="spc-rc-grand">
                    <span>Total pay owed</span><span>{gbp(data.total)}</span>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      </div>

      {/* editor modal */}
      {editing && editShift && (
        <div className="spc-overlay" onClick={() => setEditing(null)}>
          <div className="spc-modal" onClick={(e) => e.stopPropagation()}>
            <div className="spc-modal-head">
              <div className="spc-modal-date">
                {["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date(editing.y, editing.m, editing.d).getDay()]} {editing.d} {MONTHS[editing.m]}
              </div>
              <div className="spc-modal-sub">{editing.y}</div>
            </div>
            <div className="spc-modal-body">
              <div>
                <div className="spc-field-label">Rate</div>
                <div className="spc-ratepick">
                  {RATE_ORDER.map((rk) => {
                    const meta = RATE_META[rk];
                    const on = editShift.rate === rk;
                    return (
                      <button key={rk} className={on ? "on" : ""}
                        style={on ? { background: meta.color } : {}}
                        onClick={() => patchEditing({ rate: rk })}>
                        <span className="bd" style={{ background: on ? "#fff" : meta.color }} />
                        {meta.label}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div>
                <div className="spc-field-label">Shift length</div>
                <div className="spc-hoursrow">
                  <input type="number" min="0" max="24" step="0.5" value={editShift.hours}
                    onChange={(e) => patchEditing({ hours: e.target.value === "" ? 0 : parseFloat(e.target.value) })} />
                  <input className="spc-slider" type="range" min="0" max="24" step="0.5"
                    style={{ "--rc": editMeta.color, flex: 1 }}
                    value={editShift.hours}
                    onChange={(e) => patchEditing({ hours: parseFloat(e.target.value) })} />
                  <span className="mono" style={{ fontSize: 13, color: "var(--ink-soft)" }}>hrs</span>
                </div>
                <div className="spc-linepay mono">
                  {editShift.hours.toFixed(1)} hrs × {gbp(editRate)} = <b>{gbp(editPay)}</b>
                </div>
              </div>
            </div>
            <div className="spc-modal-foot">
              <button className="spc-btn danger" onClick={deleteEditing}><Trash2 size={15} /> Remove</button>
              <button className="spc-btn primary" onClick={() => setEditing(null)}><Check size={15} /> Done</button>
            </div>
          </div>
        </div>
      )}

      {/* clear-month confirmation */}
      {confirmClear && (
        <div className="spc-overlay" onClick={() => setConfirmClear(false)}>
          <div className="spc-modal" onClick={(e) => e.stopPropagation()}>
            <div className="spc-modal-head">
              <div className="spc-modal-date">Clear {MONTHS[month]} {year}?</div>
              <div className="spc-modal-sub">
                This removes {data.items.length} shift{data.items.length === 1 ? "" : "s"} for this month. It can't be undone.
              </div>
            </div>
            <div className="spc-modal-foot" style={{ paddingTop: 16 }}>
              <button className="spc-btn" onClick={() => setConfirmClear(false)}>Cancel</button>
              <button className="spc-btn danger" onClick={doClearMonth}>
                <Trash2 size={15} /> Remove all
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ShiftPayCalendar />);

</script>
</body>
</html>
